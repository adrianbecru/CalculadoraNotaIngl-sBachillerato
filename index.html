<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Notas Inglés - Bachillerato</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 800px; /* Evita que sea demasiado ancha */
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9rem; }

        /* Contenedor de tabla con scroll para que no se salga */
        .table-wrapper {
            max-height: 60vh; /* Altura máxima para que no ocupe toda la pantalla */
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            position: sticky; /* Cabecera fija al hacer scroll */
            top: 0;
            background: var(--primary);
            color: white;
            padding: 12px;
            z-index: 10;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .criterio-nombre {
            font-weight: bold;
            background: #f1f4f7;
            width: 40%;
        }

        .desc-mini {
            display: block;
            font-weight: normal;
            font-size: 0.75rem;
            color: #7f8c8d;
            margin-top: 3px;
        }

        .inputs-container {
            display: flex;
            gap: 5px;
            flex-wrap: wrap; /* Si hay muchas notas, bajan a la siguiente línea */
        }

        input[type="number"] {
            width: 50px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }

        .media-parcial {
            font-weight: bold;
            color: var(--accent);
            text-align: center;
            width: 60px;
        }

        .footer-calc {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f1f4f7;
            border-radius: 10px;
        }

        .btn-calc {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .btn-calc:hover { background: #219150; }

        .final-score {
            text-align: right;
        }

        #total {
            display: block;
            font-size: 2rem;
            color: var(--primary);
            font-weight: 900;
        }

        /* Estilo para el scroll */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calificador de Inglés</h1>
    <p class="subtitle">Introduce hasta 4 notas por cada criterio (deja en blanco si no tienes nota).</p>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Criterio y Descripción</th>
                    <th>Notas (0-10)</th>
                    <th>Media</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo">
                </tbody>
        </table>
    </div>

    <div class="footer-calc">
        <button class="btn-calc" onclick="calcular()">Calcular Nota Final</button>
        <div class="final-score">
            <span>MEDIA TOTAL:</span>
            <span id="total">0.00</span>
        </div>
    </div>
</div>

<script>
    const criterios = [
        { id: "1.1", desc: "Comprensión de textos (información global/específica)" },
        { id: "1.2", desc: "Estrategias de comprensión (contexto y léxico)" },
        { id: "1.3", desc: "Análisis crítico de textos" },
        { id: "2.1", desc: "Producción oral y escrita organizada" },
        { id: "2.2", desc: "Planificación y revisión de textos" },
        { id: "2.3", desc: "Gramática, ortografía y fluidez" },
        { id: "3.1", desc: "Interacción oral/escrita (opiniones)" },
        { id: "3.2", desc: "Estrategias de interacción y cooperación" },
        { id: "4.1", desc: "Mediación de mensajes" },
        { id: "4.2", desc: "Estrategias para facilitar la comunicación" },
        { id: "5.1", desc: "Plurilingüismo y estrategias de aprendizaje" },
        { id: "6.1", desc: "Interculturalidad y respeto a la diversidad" }
    ];

    const cuerpo = document.getElementById('tabla-cuerpo');

    // Generar las filas de la tabla
    criterios.forEach((c, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="criterio-nombre">
                Crit. ${c.id}
                <span class="desc-mini">${c.desc}</span>
            </td>
            <td>
                <div class="inputs-container">
                    <input type="number" class="n-${index}" min="0" max="10" step="0.1">
                    <input type="number" class="n-${index}" min="0" max="10" step="0.1">
                    <input type="number" class="n-${index}" min="0" max="10" step="0.1">
                    <input type="number" class="n-${index}" min="0" max="10" step="0.1">
                </div>
            </td>
            <td class="media-parcial" id="media-${index}">-</td>
        `;
        cuerpo.appendChild(tr);
    });

    function calcular() {
        let sumaTotales = 0;

        criterios.forEach((c, index) => {
            const inputs = document.querySelectorAll(`.n-${index}`);
            let sumaCriterio = 0;
            let contador = 0;

            inputs.forEach(input => {
                if (input.value !== "") {
                    sumaCriterio += parseFloat(input.value);
                    contador++;
                }
            });

            let mediaCriterio = contador > 0 ? (sumaCriterio / contador) : 0;
            document.getElementById(`media-${index}`).innerText = mediaCriterio.toFixed(2);
            sumaTotales += mediaCriterio;
        });

        const notaFinal = sumaTotales / 12;
        document.getElementById('total').innerText = notaFinal.toFixed(2);
    }
</script>

</body>
</html>
